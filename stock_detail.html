<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARKET MONITOR - Stock Detail</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="commodity_detail.css">

    <link rel="icon" href="assets/logo.png">
    
    <script src="settings.js" defer></script>
</head>

<body class="luxury-theme">
    <div class="app-background"></div>

    <div class="page-container">
        <!-- Header / Title Bar -->
        <header class="detail-header">
            <div class="header-left">
                <a id="backLink" href="stock_search.html" class="back-btn">
                    <i class="fa-solid fa-chevron-left"></i>
                    <span>Indietro</span>
                </a>
                <div class="title-group">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span id="stockTicker" style="background: var(--accent-blue); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; color: white;">---</span>
                        <h1 id="stockName">---</h1>
                    </div>
                    <p id="stockExchange">---</p>
                </div>
            </div>
            <div class="header-right" style="display:flex; align-items:center; gap:20px;">
                <button id="refreshBtn" class="refresh-indicator-detail" title="Aggiorna Quotazione" style="background:none; border:1px solid var(--border-color); color:var(--text-muted); cursor:pointer; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
                <div class="price-info">
                    <div id="latestPrice" class="detail-price">$0.00</div>
                    <div id="priceChange" class="detail-change">0.00%</div>
                </div>
            </div>
        </header>

        <!-- Main Chart Section -->
        <section class="chart-section">
            <div class="section-card">
                <div class="card-header">
                    <h2>Andamento Storico</h2>
                    <div class="chart-filters">
                        <button class="filter-btn" data-range="5y">5Y</button>
                        <button class="filter-btn" data-range="1y">1Y</button>
                        <button class="filter-btn" data-range="6m">6M</button>
                        <button class="filter-btn" data-range="3m">3M</button>
                        <button class="filter-btn active" data-range="1m">1M</button>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="stockChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Historical Data Section -->
        <section class="data-section">
            <div class="section-card">
                <div class="card-header">
                    <h2 id="tableTitle">Dati Storici</h2>
                    <button id="exportData" class="export-btn">
                        <i class="fa-solid fa-file-export"></i>
                        Esporta
                    </button>
                </div>
                <div class="table-wrapper">
                    <table id="historicalTable">
                        <thead>
                            <tr>
                                <th id="periodLabel">Periodo</th>
                                <th>Px Chiusura Periodo</th>
                                <th>Px Apertura Periodo</th>
                                <th>Var %</th>
                                <th>Minimo</th>
                                <th>Massimo</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="hub-footer">
            <p>© 2026 MARKET MONITOR - Specialized Trading Hub</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Side Actions bar -->
    <div class="side-actions">
        <div class="lang-selector">
            <button class="lang-btn" title="English"><span class="fi fi-gb"></span></button>
            <button class="lang-btn" title="Français"><span class="fi fi-fr"></span></button>
            <button class="lang-btn active" title="Italiano"><span class="fi fi-it"></span></button>
        </div>
        <div class="secondary-actions">
            <button class="side-icon-btn" title="Privacy">
                <i class="fa-solid fa-user-shield"></i>
            </button>
            <button class="side-icon-btn" id="toolsBtn" title="Strumenti">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </button>
        </div>
    </div>

    <!-- Tools Modal -->
    <div id="toolsModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Strumenti</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="tool-item">
                    <span>Tema App</span>
                    <button id="themeToggle" class="theme-btn">
                        <i class="fa-solid fa-moon"></i>
                        <span id="themeLabel">Scuro</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="twelvedata_api.js"></script>
    <script src="stock_detail.js"></script>
</body>

</html>
