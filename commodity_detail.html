<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARKET MONITOR - Commodity Detail</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="commodity_detail.css">

    <link rel="icon" href="assets/logo.png">
    
    <script src="settings.js" defer></script>
</head>

<body class="luxury-theme">
    <div class="app-background"></div>

    <div class="page-container">
        <!-- Header / Title Bar -->
        <header class="detail-header">
            <div class="header-left">
                <a href="commodities.html" class="back-btn">
                    <i class="fa-solid fa-chevron-left"></i>
                    <span>Indietro</span>
                </a>
                <div class="title-group">
                    <h1 id="commodityName">---</h1>
                    <p id="commodityMarket">---</p>
                </div>
            </div>
            <div class="header-right">
                <div class="price-info">
                    <div id="latestPrice" class="detail-price">$0.00</div>
                    <div id="priceChange" class="detail-change">0.00%</div>
                </div>
            </div>
        </header>

        <!-- Main Chart Section -->
        <section class="chart-section">
            <div class="section-card">
                <div class="card-header">
                    <h2>Andamento Storico</h2>
                    <div class="chart-filters">
                        <button class="filter-btn active" data-range="5y">5Y</button>
                        <button class="filter-btn" data-range="1y">1Y</button>
                        <button class="filter-btn" data-range="6m">6M</button>
                        <button class="filter-btn" data-range="3m">3M</button>
                        <button class="filter-btn" data-range="1m">1M</button>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="commodityChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Historical Data Section -->
        <section class="data-section">
            <div class="section-card">
                <div class="card-header">
                    <h2 id="tableTitle">Dati Storici</h2>
                    <button id="exportData" class="export-btn">
                        <i class="fa-solid fa-file-export"></i>
                        Esporta
                    </button>
                </div>
                <div class="table-wrapper">
                    <table id="historicalTable">
                        <thead>
                            <tr>
                                <th id="periodLabel">Periodo</th>
                                <th>Px Chiusura Periodo</th>
                                <th>Px Apertura Periodo</th>
                                <th>Var %</th>
                                <th>Minimo</th>
                                <th>Massimo</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="hub-footer">
            <p>© 2026 MARKET MONITOR - Specialized Trading Hub</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="commodity_detail.js"></script>
</body>
</html>
